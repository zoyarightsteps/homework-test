          name: bankQuestionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bank question deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      bankQuestion:
                        $ref: '#/components/schemas/AdminBankQuestion'
        '400':
          description: Already deactivated
        '401':
          description: Unauthenticated
        '403':
          description: Not an admin
        '404':
          description: Bank question not found
