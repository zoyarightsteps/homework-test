  /homework/admin/question-bank/questions:
    post:
      tags: [Homework — Admin]
      summary: Create a bank question
      description: |
        Creates a new bank question. Starts as unpublished (`isPublished: false`). Use the publish endpoint to make it visible to tutors.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subjectId, topicId, subTopicId, type, questionText]
              properties:
                subjectId:
                  type: string
                topicId:
                  type: string
                subTopicId:
                  type: string
                objectiveId:
                  type: string
                  nullable: true
                type:
                  type: string
                  enum: [MULTIPLE_CHOICE, SHORT_ANSWER, LONG_ANSWER, FILL_BLANK, MATCH, TRUE_FALSE, ORDERING, READING_COMPREHENSION, VIDEO]
                questionText:
                  type: string
                  minLength: 1
                modelAnswer:
                  type: string
                  nullable: true
                imageUploadIds:
                  type: array
                  items:
                    type: string
                  default: []
                options:
                  type: array
                  items:
                    type: string
                  description: Required for MULTIPLE_CHOICE and TRUE_FALSE
                correctOption:
                  type: string
                  nullable: true
                  description: Required for MULTIPLE_CHOICE and TRUE_FALSE
                matchPairs:
                  type: object
                  nullable: true
                  additionalProperties:
                    type: string
                  description: Required for MATCH
                orderItems:
                  type: array
                  items:
                    type: string
                  description: Required for ORDERING (min 2 items)
                blankAnswers:
                  type: array
                  items:
                    type: string
                  description: Required for FILL_BLANK
                examBoard:
                  type: string
                  nullable: true
                  enum: [EDEXCEL, AQA, OCR, WJEC, CAMBRIDGE, IB, NONE]
                level:
                  type: string
                  nullable: true
                  enum: [KS3, GCSE, A_LEVEL, ELEVEN_PLUS, SATS]
                difficulty:
                  type: string
                  nullable: true
                  enum: [FOUNDATION, STANDARD, HIGHER, STRETCH]
                price:
                  type: integer
                  minimum: 0
                  default: 0
                  description: Price in pence
      responses:
        '201':
          description: Bank question created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      bankQuestion:
                        $ref: '#/components/schemas/AdminBankQuestion'
        '400':
          description: Validation error
        '401':
          description: Unauthenticated
        '403':
          description: Not an admin
        '404':
          description: Subject, topic, subtopic, or objective not found

    get:
      tags: [Homework — Admin]
      summary: List all bank questions (admin)
      description: Paginated list of all bank questions including unpublished. Filterable by subject, topic, subtopic, objective, type, examBoard, level, difficulty, publish status, and keyword search.
      parameters:
        - in: query
          name: subjectId
          schema:
            type: string
        - in: query
          name: topicId
          schema:
            type: string
        - in: query
          name: subTopicId
          schema:
            type: string
        - in: query
          name: objectiveId
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [MULTIPLE_CHOICE, SHORT_ANSWER, LONG_ANSWER, FILL_BLANK, MATCH, TRUE_FALSE, ORDERING, READING_COMPREHENSION, VIDEO]
        - in: query
          name: examBoard
          schema:
            type: string
            enum: [EDEXCEL, AQA, OCR, WJEC, CAMBRIDGE, IB, NONE]
        - in: query
          name: level
          schema:
            type: string
            enum: [KS3, GCSE, A_LEVEL, ELEVEN_PLUS, SATS]
        - in: query
          name: difficulty
          schema:
            type: string
            enum: [FOUNDATION, STANDARD, HIGHER, STRETCH]
        - in: query
          name: isPublished
          schema:
            type: string
            enum: ['true', 'false']
        - in: query
          name: search
          schema:
            type: string
          description: Keyword search on questionText
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated bank questions
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      questions:
                        type: array
                        items:
                          $ref: '#/components/schemas/AdminBankQuestion'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthenticated
        '403':
          description: Not an admin

  /homework/admin/question-bank/questions/{bankQuestionId}/update:
    post:
      tags: [Homework — Admin]
      summary: Update a bank question
      description: Partially updates a bank question. All fields optional — only provided fields are updated.
      parameters:
        - in: path
          name: bankQuestionId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subjectId:
                  type: string
                topicId:
                  type: string
                subTopicId:
                  type: string
                objectiveId:
                  type: string
                  nullable: true
                type:
                  type: string
                  enum: [MULTIPLE_CHOICE, SHORT_ANSWER, LONG_ANSWER, FILL_BLANK, MATCH, TRUE_FALSE, ORDERING, READING_COMPREHENSION, VIDEO]
                questionText:
                  type: string
                  minLength: 1
                modelAnswer:
                  type: string
                  nullable: true
                imageUploadIds:
                  type: array
                  items:
                    type: string
                options:
                  type: array
                  items:
                    type: string
                correctOption:
                  type: string
                  nullable: true
                matchPairs:
                  type: object
                  nullable: true
                  additionalProperties:
                    type: string
                orderItems:
                  type: array
                  items:
                    type: string
                blankAnswers:
                  type: array
                  items:
                    type: string
                examBoard:
                  type: string
                  nullable: true
                  enum: [EDEXCEL, AQA, OCR, WJEC, CAMBRIDGE, IB, NONE]
                level:
                  type: string
                  nullable: true
                  enum: [KS3, GCSE, A_LEVEL, ELEVEN_PLUS, SATS]
                difficulty:
                  type: string
                  nullable: true
                  enum: [FOUNDATION, STANDARD, HIGHER, STRETCH]
                price:
                  type: integer
                  minimum: 0
                  description: Price in pence
      responses:
        '200':
          description: Bank question updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      bankQuestion:
                        $ref: '#/components/schemas/AdminBankQuestion'
        '400':
          description: Validation error
        '401':
          description: Unauthenticated
        '403':
          description: Not an admin
        '404':
          description: Bank question not found

  /homework/admin/question-bank/questions/{bankQuestionId}/publish:
    post:
      tags: [Homework — Admin]
      summary: Publish a bank question
      description: Marks the question as published. Makes it visible to tutors browsing the question bank.
      parameters:
        - in: path
          name: bankQuestionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bank question published
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      bankQuestion:
                        $ref: '#/components/schemas/AdminBankQuestion'
        '400':
          description: Already published
        '401':
          description: Unauthenticated
        '403':
          description: Not an admin
        '404':
          description: Bank question not found

  /homework/admin/question-bank/questions/{bankQuestionId}/unpublish:
    post:
      tags: [Homework — Admin]
      summary: Unpublish a bank question
      description: Marks the question as unpublished. Hides it from tutors without deleting.
      parameters:
        - in: path
          name: bankQuestionId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Bank question unpublished
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      bankQuestion:
                        $ref: '#/components/schemas/AdminBankQuestion'
        '400':
          description: Already unpublished
        '401':
          description: Unauthenticated
        '403':
          description: Not an admin
        '404':
          description: Bank question not found

  /homework/admin/question-bank/questions/{bankQuestionId}/deactivate:
    post:
      tags: [Homework — Admin]
      summary: Deactivate a bank question
