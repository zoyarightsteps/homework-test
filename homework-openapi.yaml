              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/ChildHomeworkDetail'
        '401':
          description: Unauthenticated
        '403':
          description: Not a parent
        '404':
          description: Homework not found

