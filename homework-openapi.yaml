openapi: 3.0.0
info:
  title: RightSteps Homework API
  version: 1.0.0
  description: |
    Homework module for the RightSteps platform.

    **Roles:**
    - `TUTOR` — create drafts, assign, grade, revert homework
    - `PARENT` — view child homework, save/submit answers on child's behalf, browse and purchase question bank access via cart
    - `ADMIN` — manage the question bank

    **Homework Lifecycle:**
    1. Tutor checks eligibility (`can-assign`)
    2. Tutor creates a `DRAFT` (`POST /homework`)
    3. Tutor adds questions (`POST /homework/{id}/questions`)
    4. Tutor assigns to child (`POST /homework/{id}/assign`) → `ASSIGNED`
    5. Parent saves child's answers (`draft`) → `IN_PROGRESS`
    6. Parent submits (`submit`) → `SUBMITTED`; MCQ auto-scored, written answers AI-graded async
    7. Tutor grades overall (`grade`) → `COMPLETED`
    8. Optionally tutor reverts questions (`revert`) → `REVERTED`; child resubmits (`resubmit`)

servers:
  - url: http://localhost:5000/v1
    description: Local development
  - url: https://api.rightsteps.app/v1
    description: Production

tags:
  - name: Homework — Tutor
    description: Create, assign, grade, and manage homework
  - name: Homework — Child
    description: Child homework (accessed via authenticated parent)
  - name: Homework — Parent
    description: Parent view of child homework and question bank pricing
  - name: Homework — Question Bank
    description: Browse published bank questions (active subscription required)
  - name: Homework — Parent Marketplace
    description: Parent browse, purchase, and cart flow for the question bank
  - name: Homework — Admin
    description: Admin endpoints for managing the question bank

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Pagination:
      type: object
      properties:
        total:
          type: integer
          example: 42
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        hasNextPage:
          type: boolean
          example: true

    SubTopicFlat:
      type: object
      description: Flat subtopic item as returned in homework detail (order + subtopic fields merged)
      properties:
        order:
          type: integer
          example: 1
        id:
          type: string
          example: cmst1abc0001r4ujxiqej3no
        name:
          type: string
          example: Linear Equations
        code:
          type: string
          example: ALG-01

    HomeworkAnswer:
      type: object
      properties:
        id:
          type: string
        textAnswer:
          type: string
          nullable: true
        selectedOption:
          type: string
          nullable: true
        matchAnswer:
          type: object
          nullable: true
          additionalProperties:
            type: string
        orderAnswer:
          type: array
          items:
            type: string
        imageUploadIds:
          type: array
          items:
            type: string
        isDraft:
          type: boolean
        isSkipped:
          type: boolean
        isCorrect:
          type: boolean
          nullable: true
        aiGrade:
          type: string
          nullable: true
          enum: [OUTSTANDING, GOOD, SATISFACTORY, NEEDS_IMPROVEMENT]
        aiFeedback:
          type: string
          nullable: true
        tutorGrade:
          type: string
          nullable: true
          enum: [OUTSTANDING, GOOD, SATISFACTORY, NEEDS_IMPROVEMENT]
        tutorFeedback:
          type: string
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true

    TutorHomeworkQuestion:
      type: object
      description: Question in tutor view — includes modelAnswer, correctOption, and objective details
      properties:
        id:
          type: string
        type:
          type: string
          enum: [MULTIPLE_CHOICE, SHORT_ANSWER, LONG_ANSWER, FILL_BLANK, MATCH, TRUE_FALSE, ORDERING, READING_COMPREHENSION, VIDEO]
        questionText:
          type: string
        modelAnswer:
          type: string
          nullable: true
        options:
          type: array
          items:
            type: string
        correctOption:
          type: string
          nullable: true
        matchPairs:
          type: object
          nullable: true
          additionalProperties:
            type: string
        orderItems:
          type: array
          items:
            type: string
        blankAnswers:
          type: array
          items:
            type: string
        passage:
          type: string
          nullable: true
        videoUrl:
          type: string
          nullable: true
        videoNote:
          type: string
          nullable: true
        imageUploadIds:
          type: array
          items:
            type: string
        examBoard:
          type: string
          nullable: true
          enum: [EDEXCEL, AQA, OCR, WJEC, CAMBRIDGE, IB, NONE]
        level:
          type: string
          nullable: true
          enum: [KS3, GCSE, A_LEVEL, ELEVEN_PLUS, SATS]
        difficulty:
          type: string
          nullable: true
          enum: [FOUNDATION, STANDARD, HIGHER, STRETCH]
        isReverted:
          type: boolean
        revertNote:
          type: string
          nullable: true
        order:
          type: integer
        isFromBank:
          type: boolean
        objectiveId:
          type: string
          nullable: true
          description: FK to CurriculumObjective (cuid)
        objectiveCode:
          type: string
          nullable: true
          description: Human-readable objective code e.g. ALG-01-1. Present when objectiveId is set.
          example: ALG-01-1
        learningObjective:
          type: string
          nullable: true
          description: Full objective text. Present when objectiveId is set.
        answers:
          type: array
          items:
            $ref: '#/components/schemas/HomeworkAnswer'

