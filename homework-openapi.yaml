                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      homeworks:
                        type: array
                        items:
                          $ref: '#/components/schemas/ChildHomeworkListItem'
                      pagination:
                        $ref: '#/components/schemas/Pagination'
        '401':
          description: Unauthenticated
        '403':
          description: Not a parent
