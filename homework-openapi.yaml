          description: Subtopics list
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      subTopics:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                            name:
                              type: string
                              example: Linear Equations
                            code:
                              type: string
                              example: ALG-01
        '401':
          description: Unauthenticated
        '403':
          description: Not a tutor or subscription inactive
        '404':
          description: Topic not found

  /homework/question-bank/questions:
    get:
      tags: [Homework — Question Bank]
      summary: Browse published bank questions
